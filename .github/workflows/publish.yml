name: Publish NuGet

on:
  push:
    tags:
    - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    - name: Restore
      run: dotnet restore
    - name: Build (Release)
      run: dotnet build --configuration Release --no-restore
    - name: Pack
      run: |
        dotnet pack src/SmartPipe.Memory/SmartPipe.Memory.csproj --configuration Release --output artifacts /p:ContinuousIntegrationBuild=true
        dotnet pack src/SmartPipe.Memory.Extensions/SmartPipe.Memory.Extensions.csproj --configuration Release --output artifacts /p:ContinuousIntegrationBuild=true
        dotnet pack src/SmartPipe.Memory.Health/SmartPipe.Memory.Health.csproj --configuration Release --output artifacts /p:ContinuousIntegrationBuild=true
    - name: Push to NuGet
      run: |
        dotnet nuget push artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate